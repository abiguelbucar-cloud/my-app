<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRush PRO+</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e40af);
  color: white;
  text-align: center;
}

.container { padding: 15px; }

h1 { color: #38bdf8; }

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

input, select, button {
  padding: 10px;
  margin: 6px;
  width: 85%;
  border-radius: 10px;
  border: none;
}

button {
  background: linear-gradient(45deg,#38bdf8,#0ea5e9);
  font-weight: bold;
  cursor: pointer;
  color:white;
}

button:hover {
  transform: scale(1.05);
}

.hidden { display: none; }

.badge {
  padding: 5px 10px;
  background: gold;
  color: black;
  border-radius: 10px;
  display: inline-block;
  margin: 5px;
}

.playerBox {
  background: rgba(255,255,255,0.1);
  padding:10px;
  margin:5px;
  border-radius:10px;
}
.active {
  border: 2px solid #38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 SkillRush PRO+</h1>

<!-- SETUP -->
<div id="setup">
  <div class="card">
    <h3>Enter 4 Players</h3>
    <input id="p1" placeholder="Player 1">
    <input id="p2" placeholder="Player 2">
    <input id="p3" placeholder="Player 3">
    <input id="p4" placeholder="Player 4">
    <button onclick="start()">Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="home" class="hidden">

  <div id="playersUI" class="card"></div>

  <div class="card">
    <button onclick="quizGame()">📘 Quiz</button>
    <button onclick="puzzleGame()">🧩 Puzzle</button>
    <button onclick="showBoard()">🏆 Leaderboard</button>
  </div>

  <div id="game" class="card"></div>

</div>

</div>

<script>

// SOUND
function sound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.type = "square";
  o.frequency.value = type === "correct" ? 900 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

// PLAYERS
let players = [];
let current = 0;
let score = 0;

// START
function start(){
  let p1 = document.getElementById("p1").value;
  let p2 = document.getElementById("p2").value;
  let p3 = document.getElementById("p3").value;
  let p4 = document.getElementById("p4").value;

  if(!p1 || !p2 || !p3 || !p4){
    alert("Enter all 4 players");
    return;
  }

  players = [
    {name:p1, score:0},
    {name:p2, score:0},
    {name:p3, score:0},
    {name:p4, score:0}
  ];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");

  updatePlayersUI();
}

// SHOW PLAYERS
function updatePlayersUI(){
  let html = players.map((p,i)=>`
    <div class="playerBox ${i===current?'active':''}">
      ${p.name} ⭐ ${p.score}
    </div>
  `).join("");

  document.getElementById("playersUI").innerHTML = html;
}

// SWITCH PLAYER
function nextPlayer(){
  current = (current + 1) % 4;
  updatePlayersUI();
}

// QUESTIONS
let questions = [
  {q:"5 + 5 = ?", a:"10"},
  {q:"Capital of Philippines?", a:"manila"},
  {q:"2 x 9 = ?", a:"18"},
  {q:"Water formula?", a:"h2o"}
];

let qIndex = 0;

function quizGame(){
  qIndex = 0;
  score = 0;
  nextQ();
}

function nextQ(){
  if(qIndex >= questions.length){
    endGame("Quiz");
    return;
  }

  let q = questions[qIndex];

  document.getElementById("game").innerHTML = `
    <h3>${players[current].name}'s Turn</h3>
    <h2>${q.q}</h2>
    <input id="ans">
    <button onclick="checkQ()">Submit</button>
  `;
}

function checkQ(){
  let ans = document.getElementById("ans").value.toLowerCase();

  if(ans === questions[qIndex].a){
    players[current].score += 10;
    sound("correct");
  } else {
    sound("wrong");
  }

  qIndex++;
  nextPlayer();
  nextQ();
}

// PUZZLES
let puzzles = [
  {w:"JAVASCRIPT", hint:"Web language"},
  {w:"ANDROID", hint:"Mobile OS"},
  {w:"COMPUTER", hint:"Digital machine"}
];

let pIndex = 0;

function puzzleGame(){
  pIndex = 0;
  showPuzzle();
}

function scramble(word){
  return word.split("").sort(()=>Math.random()-0.5).join("");
}

function showPuzzle(){
  if(pIndex >= puzzles.length){
    endGame("Puzzle");
    return;
  }

  let p = puzzles[pIndex];

  document.getElementById("game").innerHTML = `
    <h3>${players[current].name}'s Turn</h3>
    <p>${p.hint}</p>
    <h2>${scramble(p.w)}</h2>
    <input id="pans">
    <button onclick="checkP()">Answer</button>
  `;
}

function checkP(){
  let ans = document.getElementById("pans").value.toUpperCase();

  if(ans === puzzles[pIndex].w){
    players[current].score += 15;
    sound("correct");
  } else {
    sound("wrong");
  }

  pIndex++;
  nextPlayer();
  showPuzzle();
}

// END GAME
function endGame(type){
  updatePlayersUI();

  document.getElementById("game").innerHTML = `
    <h2>🎉 ${type} Finished!</h2>
  `;
}

// LEADERBOARD
function showBoard(){
  let sorted = [...players].sort((a,b)=>b.score-a.score);

  let list = sorted.map(p =>
    `<p>${p.name} ⭐ ${p.score}</p>`
  ).join("");

  document.getElementById("game").innerHTML = `
    <h3>🏆 Leaderboard</h3>
    ${list}
  `;
}

</script>

</body>
</html>
