<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRush Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  text-align: center;
}

.container { padding: 15px; }

h1 { color: #38bdf8; }

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  margin: 10px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

input, select, button {
  padding: 10px;
  margin: 6px;
  width: 85%;
  border-radius: 10px;
  border: none;
}

button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #0ea5e9;
}

.hidden { display: none; }

.badge {
  padding: 5px 10px;
  background: gold;
  color: black;
  border-radius: 10px;
  display: inline-block;
  margin: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 SkillRush PRO</h1>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h3>Create Player</h3>
    <input id="name" placeholder="Username">
    <select id="grade">
      <option>Grade 1-3</option>
      <option>Grade 4-6</option>
      <option>Junior High</option>
      <option>Senior High</option>
      <option>College</option>
    </select>
    <button onclick="start()">Start Game</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="home" class="hidden">

  <div class="card">
    <h3 id="welcome"></h3>
    <div class="badge" id="levelBadge">Level: Easy</div>
  </div>

  <div class="card">
    <button onclick="quizGame()">📘 Quiz Battle</button>
    <button onclick="puzzleGame()">🧩 Puzzle Rush</button>
    <button onclick="showBoard()">🏆 Leaderboard</button>
  </div>

  <div id="game" class="card"></div>

</div>

</div>

<script>

// SOUND EFFECTS
function sound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.type = "sine";
  o.frequency.value = type === "correct" ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

// PLAYER DATA
let player = {};
let score = 0;

// LOAD PLAYERS
let players = JSON.parse(localStorage.getItem("players") || "[]");

// START GAME
function start(){
  let name = document.getElementById("name").value;
  let grade = document.getElementById("grade").value;

  if(!name) return alert("Enter name");

  player = {name, grade, score:0};

  document.getElementById("login").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");

  document.getElementById("welcome").innerText =
    "Welcome " + name;

  setLevel(grade);
}

// LEVEL SYSTEM
function setLevel(grade){
  let level = "Easy";

  if(grade === "Grade 4-6") level = "Easy";
  if(grade === "Junior High") level = "Medium";
  if(grade === "Senior High") level = "Hard";
  if(grade === "College") level = "Hard";

  document.getElementById("levelBadge").innerText = "Level: " + level;
}

// QUIZ GAME
let qIndex = 0;

let questions = [
  {q:"5 + 5 = ?", a:"10"},
  {q:"12 ÷ 4 = ?", a:"3"},
  {q:"Capital of Philippines?", a:"manila"},
  {q:"Earth is a planet (yes/no)", a:"yes"},
  {q:"2 x 9 = ?", a:"18"},
  {q:"Sun is a star (yes/no)", a:"yes"},
  {q:"Water formula?", a:"h2o"},
  {q:"10 - 7 = ?", a:"3"},
  {q:"Largest ocean?", a:"pacific"},
  {q:"100 + 100 = ?", a:"200"}
];

function quizGame(){
  qIndex = 0;
  score = 0;
  nextQ();
}

function nextQ(){
  if(qIndex >= questions.length){
    endGame("Quiz");
    return;
  }

  let q = questions[qIndex];

  document.getElementById("game").innerHTML = `
    <h3>${q.q}</h3>
    <input id="ans">
    <button onclick="checkQ()">Submit</button>
  `;
}

function checkQ(){
  let ans = document.getElementById("ans").value.toLowerCase();

  if(ans === questions[qIndex].a){
    score += 10;
    sound("correct");
  } else {
    sound("wrong");
  }

  qIndex++;
  nextQ();
}

// PUZZLE GAME
let puzzles = [
  {w:"JAVASCRIPT", hint:"Web language"},
  {w:"COMPUTER", hint:"Digital machine"},
  {w:"INTERNET", hint:"Global network"},
  {w:"ANDROID", hint:"Mobile OS"},
  {w:"EDUCATION", hint:"Learning system"}
];

let pIndex = 0;

function puzzleGame(){
  pIndex = 0;
  score = 0;
  showPuzzle();
}

function scramble(word){
  return word.split("").sort(()=>Math.random()-0.5).join("");
}

function showPuzzle(){
  if(pIndex >= puzzles.length){
    endGame("Puzzle");
    return;
  }

  let p = puzzles[pIndex];

  document.getElementById("game").innerHTML = `
    <h3>Guess the Word</h3>
    <p>Hint: ${p.hint}</p>
    <h2>${scramble(p.w)}</h2>
    <input id="pans">
    <button onclick="checkP()">Answer</button>
  `;
}

function checkP(){
  let ans = document.getElementById("pans").value.toUpperCase();

  if(ans === puzzles[pIndex].w){
    score += 15;
    sound("correct");
  } else {
    sound("wrong");
  }

  pIndex++;
  showPuzzle();
}

// END GAME + SAVE
function endGame(type){

  player.score += score;

  players.push({
    name: player.name,
    grade: player.grade,
    score: player.score,
    type: type
  });

  localStorage.setItem("players", JSON.stringify(players));

  document.getElementById("game").innerHTML = `
    <h2>🎉 ${type} Finished!</h2>
    <h3>Score: ${score}</h3>
  `;
}

// LEADERBOARD
function showBoard(){

  let sorted = players.sort((a,b)=>b.score-a.score);

  let list = sorted.map(p =>
    `<p>${p.name} - ${p.grade} - ⭐ ${p.score}</p>`
  ).join("");

  document.getElementById("game").innerHTML = `
    <h3>🏆 Leaderboard</h3>
    ${list}
  `;
}

</script>

</body>
</html>
