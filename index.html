<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillRush</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e3a8a,#0f172a);
    color:white;
    text-align:center;
}
.screen{display:none;padding:20px;}
.active{display:block;}

button{
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
}
input{
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
}
.card{
    background:white;
    color:black;
    padding:15px;
    border-radius:15px;
    margin:10px;
}
.progress{
    height:10px;
    background:#ddd;
    border-radius:10px;
}
.bar{
    height:10px;
    background:#22c55e;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
    <h1>🎓 SkillRush</h1>
    <p>Learn • Play • Grow</p>
    <button onclick="show('login')">Start</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
    <h2>Login</h2>
    <input placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="show('menu')">Login</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">
    <h2>Select Academic Level</h2>
    <button onclick="selectLevel('Elementary - Math')">Elementary - Math</button><br>
    <button onclick="selectLevel('Secondary - Science')">Secondary - Science</button><br>
    <button onclick="selectLevel('Senior High - Research')">Senior High - Research</button><br>
    <button onclick="selectLevel('College - Capstone')">College - Capstone</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <h3 id="levelTitle"></h3>
    <div class="progress">
        <div id="progressBar" class="bar" style="width:0%"></div>
    </div>

    <div class="card">
        <h3 id="question"></h3>
        <div id="answers"></div>
    </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
    <h2>Result</h2>
    <h3 id="scoreText"></h3>
    <p id="feedback"></p>

    <h4>🏆 Rewards</h4>
    <p id="reward"></p>

    <button onclick="startQuiz()">Retry</button>
    <button onclick="show('menu')">New Level</button>
</div>

<script>
let questions = [];
let current = 0;
let score = 0;
let level = "";

// generate 30 simple questions
function generateQuestions(){
    questions = [];
    for(let i=1;i<=30;i++){
        let a = Math.floor(Math.random()*10);
        let b = Math.floor(Math.random()*10);
        questions.push({
            q: "Question "+i+": "+a+" + "+b+" = ?",
            options:[a+b, a+b+1, a+b-1],
            answer:a+b
        });
    }
}

function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectLevel(lvl){
    level = lvl;
    startQuiz();
}

function startQuiz(){
    generateQuestions();
    current = 0;
    score = 0;
    document.getElementById("levelTitle").innerText = level;
    show('quiz');
    loadQuestion();
}

function loadQuestion(){
    let q = questions[current];
    document.getElementById("question").innerText = q.q;

    let ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    q.options.forEach(opt=>{
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = ()=>checkAnswer(opt);
        ansDiv.appendChild(btn);
    });

    let progress = ((current)/30)*100;
    document.getElementById("progressBar").style.width = progress+"%";
}

function checkAnswer(ans){
    if(ans === questions[current].answer){
        score++;
    }
    current++;

    if(current < 30){
        loadQuestion();
    }else{
        showResult();
    }
}

function showResult(){
    show('result');
    document.getElementById("scoreText").innerText = 
        "Final Score: "+score+"/30";

    let feedback = score >= 20 ? "Excellent!" : "Keep practicing!";
    document.getElementById("feedback").innerText = feedback;

    // gamification
    let reward = "";
    if(score >= 25){
        reward = "🏅 Gold Badge + Level Up!";
    }else if(score >= 15){
        reward = "🥈 Silver Badge";
    }else{
        reward = "🥉 Bronze Badge";
    }

    document.getElementById("reward").innerText = reward;
}
</script>

</body>
</html>
